name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.json && npx tsc --noEmit -p tsconfig.node.json

      - name: Format check
        run: npm run format:check

      - name: Renderer build (web)
        run: npm run build:web

  # Unsigned macOS build, only on version tags — personal use, no signing/notarization
  build-mac:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: code-quality
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (unsigned)
        run: npm run build && npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kie-desktop-mac
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 14
